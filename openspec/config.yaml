schema: spec-driven

context: |
  Net Auto Push — 华为/Cisco 交换机批量 SSH 命令执行工具。
  单人单机 Windows 桌面工具，无数据库。
  Tech stack: Python 3.12 (FastAPI + uvicorn + netmiko + pandas),
  Vue 3 + Vite + Tailwind CSS + Xterm.js.
  部署: PyInstaller 单 .exe 打包。
  Code conventions: backend 模块级列表用 clear()+extend() 原地修改，不重新赋值。
  前端只有一个 WebSocket 连接（App.vue 管理），子组件不开独立 WS。
  密码字段在 API 响应中脱敏，前端不展示 password 列。
